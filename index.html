<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyqera | In Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; /* Deep modern dark blue */
        }
        
        /* Premium Gradient Text */
        .gradient-text {
            background: linear-gradient(90deg, #4899F7, #7AB8FF, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            background-size: 200% auto;
            animation: textShine 3s linear infinite;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* Pulsing Ring Animation */
        .pulse-ring {
            animation: pulsate 2s infinite ease-out;
        }
        @keyframes pulsate {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* Subtle Background Blurs */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #2457F5;
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }
        .bg-glow-2 {
            top: -50px; left: -50px;
        }
        .bg-glow-3 {
            bottom: -50px; right: -50px;
            background: #4ade80; /* Slight green hint */
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(20px); }
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="z-10 text-center max-w-2xl bg-gray-900/50 backdrop-blur-lg border border-gray-800 p-10 md:p-16 rounded-3xl shadow-2xl">
        
        <div class="relative w-24 h-24 mx-auto mb-8 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-4 border-blue-500/50 pulse-ring"></div>
            <div class="bg-gray-800 rounded-full w-20 h-20 flex items-center justify-center shadow-lg border border-gray-700 z-10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
            </div>
        </div>

        <h1 class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tight">
            <span class="gradient-text">Pyqera.</span>
        </h1>
        <h2 class="text-2xl md:text-3xl font-semibold text-gray-200 mb-6">Site is in Development 🚀</h2>
        <p class="text-gray-400 text-lg mb-10 leading-relaxed max-w-lg mx-auto">
            We are crafting the ultimate hub for premium notes and Previous Year Questions. The wait will be worth it!
        </p>

        <div class="inline-flex items-center bg-gray-950 border border-gray-800 rounded-full px-5 py-2.5 text-sm font-medium text-blue-400 shadow-inner">
            <span class="relative flex h-3 w-3 mr-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
            </span>
            System coding in progress...
        </div>
    </div>

</body>
</html>
